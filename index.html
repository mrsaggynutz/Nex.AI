<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Nex.AI</title>
    <meta name="description" content="AI-Powered Terminal & Exploit Assistant — 30+ security tools" />
    <meta name="theme-color" content="#000000" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nex.AI" />
    <meta name="application-name" content="Nex.AI" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="inputmode" content="text" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body {
        background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
        overflow: hidden; overscroll-behavior: none; -webkit-overflow-scrolling: touch; touch-action: manipulation;
      }
      .safe-top { padding-top: env(safe-area-inset-top, 0px); }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
      button, .no-select { -webkit-user-select: none; user-select: none; }
      * { scroll-behavior: smooth; }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Loading screen */
      #splash {
        position: fixed; inset: 0; z-index: 9999; background: #000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.5s ease-out;
      }
      #splash.fade-out { opacity: 0; pointer-events: none; }
      #splash .logo {
        font-size: 28px; font-weight: 900; letter-spacing: -2px; text-transform: uppercase;
        color: #00ff41; text-shadow: 0 0 30px rgba(0,255,65,0.4), 0 0 60px rgba(0,255,65,0.1);
      }
      #splash .loader {
        margin-top: 24px; width: 40px; height: 2px; background: #111; border-radius: 1px; overflow: hidden;
      }
      #splash .loader-bar {
        width: 30%; height: 100%; background: #00ff41; border-radius: 1px;
        animation: load-slide 1.2s ease-in-out infinite;
      }
      @keyframes load-slide {
        0% { transform: translateX(-100%); }
        50% { transform: translateX(300%); }
        100% { transform: translateX(-100%); }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #333; }

      /* Selection */
      ::selection { background: rgba(0,255,65,0.2); color: #fff; }

      /* Pulse animation for status indicator */
      @keyframes status-pulse {
        0%, 100% { box-shadow: 0 0 4px rgba(0,255,65,0.6); }
        50% { box-shadow: 0 0 12px rgba(0,255,65,0.9); }
      }

      /* Glow effects */
      .glow-accent { text-shadow: 0 0 10px rgba(0,255,65,0.5); }
      .glow-box { box-shadow: 0 0 20px rgba(0,255,65,0.08); }
      .glow-border { box-shadow: inset 0 0 20px rgba(0,255,65,0.03), 0 0 20px rgba(0,255,65,0.05); }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo">NEX<span style="opacity:0.6">.</span>AI</div>
      <div class="loader"><div class="loader-bar"></div></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash when React mounts
      window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 600);
          }
        }, 800);
      });
    </script>
  </body>
</html>
